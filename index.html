<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Style Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="toolbar">
        <button id="add-rect">Add Rectangle</button>
        <button id="add-text">Add Text</button>
        <button id="save">Save</button>
        <button id="load">Load</button>
        <button id="export-json">Export JSON</button>
        <button id="export-html">Export HTML</button>
    </div>

    <div id="editor">

        <div id="canvas"></div>

        <div id="side-panels">
            <div id="properties">
                <h3>Properties</h3>

                <label>Width: <input id="prop-width" type="number"></label>
                <label>Height: <input id="prop-height" type="number"></label>
                <label>Color: <input id="prop-color" type="color"></label>
                <label>Text: <input id="prop-text" type="text"></label>
                <label>Rotate: <input id="prop-rotate" type="range" min="0" max="360"></label>
            </div>

            <div id="layers">
                <h3>Layers</h3>
                <ul id="layer-list"></ul>
                <button id="layer-up">Move Up</button>
                <button id="layer-down">Move Down</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
